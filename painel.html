<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Cia do Sorriso</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
padding:30px;
}

.topo{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:20px;
}

.topo h1{
color:#2196F3;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:15px;
}

.horario{
color:#2196F3;
font-size:20px;
font-weight:bold;
}

.nome{
font-size:18px;
margin-top:8px;
}

.telefone{
color:#666;
margin-top:5px;
}

.botoes{
margin-top:15px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.ok{
background:#4CAF50;
color:white;
}

.del{
background:#F44336;
color:white;
}
</style>
</head>

<body>

<div class="topo">
<h1>🦷 Painel do Doutor</h1>
<p>Dr. Leandro Skovran</p>
</div>

<div class="card">
<div class="horario">08:00</div>
<div class="nome">João Silva</div>
<div class="telefone">📞 (42) 99999-9999</div>

<div class="botoes">
<button class="btn ok">✓ Concluído</button>
<button class="btn del">🗑 Excluir</button>
</div>
</div>

<div class="card">
<div class="horario">09:30</div>
<div class="nome">Maria Souza</div>
<div class="telefone">📞 (42) 98888-8888</div>

<div class="botoes">
<button class="btn ok">✓ Concluído</button>
<button class="btn del">🗑 Excluir</button>
</div>
</div>

<div class="card">
<div class="horario">14:00</div>
<div class="nome">Pedro Lima</div>
<div class="telefone">📞 (42) 97777-7777</div>

<div class="botoes">
<button class="btn ok">✓ Concluído</button>
<button class="btn del">🗑 Excluir</button>
</div>
</div>

</body>
</html>
